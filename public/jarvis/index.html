<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bayer Jarvis – KI-Agrarberater</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #0a0a0a;
    color: #e8e8e8;
    font-family: 'Open Sans', system-ui, sans-serif;
    font-weight: 300;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }

  /* Ambient background */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 20% 20%, rgba(30, 120, 180, 0.08), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(30, 180, 120, 0.06), transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    width: 100%;
    padding: 18px 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
  }

  .brand {
    font-size: 14px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #9fb8c4;
    font-weight: 400;
  }

  .brand span { color: #4db8a0; font-weight: 600; }

  .status {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #6a7a83;
  }

  .status .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4db8a0;
    margin-right: 8px;
    vertical-align: middle;
    box-shadow: 0 0 8px #4db8a0;
  }

  .key-reset {
    margin-left: 10px;
    cursor: pointer;
    color: #4a5a63;
    transition: color 0.2s;
  }
  .key-reset:hover { color: #9fb8c4; }

  .voice-sep { margin-left: 10px; color: #4a5a63; }

  .voice-select {
    margin-left: 6px;
    background: rgba(20,30,40,0.6);
    border: 1px solid rgba(100,160,180,0.2);
    color: #9fb8c4;
    font-family: inherit;
    font-size: 12px;
    font-weight: 400;
    cursor: pointer;
    padding: 4px 26px 4px 10px;
    border-radius: 6px;
    outline: none;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
    -webkit-appearance: none;
    -moz-appearance: none;
    appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M2 4l3 3 3-3' fill='none' stroke='%239fb8c4' stroke-width='1.3' stroke-linecap='round' stroke-linejoin='round'/></svg>");
    background-repeat: no-repeat;
    background-position: right 8px center;
    background-size: 10px 10px;
    min-width: 140px;
    max-width: 220px;
  }
  .voice-select:hover { color: #d6e8e4; border-color: rgba(77,184,160,0.4); }
  .voice-select:focus { color: #d6e8e4; border-color: rgba(77,184,160,0.6); }
  .voice-select.premium { color: #4db8a0; border-color: rgba(77,184,160,0.4); }
  .voice-select.premium:hover { color: #7fe0c4; }
  .voice-select option {
    background: #111820;
    color: #d6e8e4;
    font-size: 13px;
    padding: 6px;
    font-weight: 400;
  }
  .voice-select option:disabled { color: #4a5a63; font-style: italic; }
  .voice-select optgroup {
    color: #6a7a83;
    font-style: italic;
    background: #0a1118;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Main layout */
  main {
    flex: 1;
    width: 100%;
    max-width: 900px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 20px 20px;
    position: relative;
    z-index: 1;
    overflow: hidden;
  }

  /* ORB – Bayer edition */
  .orb-wrap {
    position: relative;
    width: 260px;
    height: 260px;
    margin: 10px 0 10px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Partikel-Canvas – größer als Orb, damit Partikel nach außen streuen können */
  .orb-particles {
    position: absolute;
    width: 520px;
    height: 520px;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 1;
  }

  /* Weicher Hintergrund-Glow hinter dem Orb */
  .orb-glow {
    position: absolute;
    inset: -10%;
    border-radius: 50%;
    background: radial-gradient(circle,
      rgba(0, 188, 255, 0.15),
      rgba(137, 211, 41, 0.08) 35%,
      transparent 60%);
    filter: blur(20px);
    z-index: 0;
    animation: glowBreathe 5s ease-in-out infinite;
  }

  /* Wrapper skaliert die Ringe live nach Audio-Lautstärke (JS-gesteuert) */
  .orb-rings-scale {
    position: absolute;
    inset: 0;
    z-index: 2;
    transform-origin: center center;
    will-change: transform;
  }

  /* Die zwei Bayer-Farbringe – rotiert als Einheit */
  .orb-rings {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    animation: spinRings 22s linear infinite;
    transform-origin: center center;
    transition: animation-duration 0.6s;
  }

  .orb-rings .ring {
    transition: fill 0.6s, opacity 0.4s;
  }
  .orb-rings .ring-green { fill: #89D329; opacity: 0.85; }
  .orb-rings .ring-cyan  { fill: #00BCFF; opacity: 0.85; }

  /* Bayer-Kreuz steht still im Zentrum */
  .orb-cross {
    position: absolute;
    width: 72%;
    height: 72%;
    left: 14%;
    top: 14%;
    z-index: 3;
    opacity: 0.92;
    filter: drop-shadow(0 0 12px rgba(16, 56, 79, 0.9));
  }
  .orb-cross .cross-text path,
  .orb-cross .cross-text polygon {
    fill: #e8f4fb;
    transition: fill 0.5s;
  }

  /* --- STATES --- */

  /* IDLE – ruhig, langsam rotierend */
  .orb-wrap[data-state="idle"] .orb-rings {
    animation-duration: 28s;
    opacity: 0.9;
  }
  .orb-wrap[data-state="idle"] .orb-glow {
    background: radial-gradient(circle,
      rgba(0, 188, 255, 0.15),
      rgba(137, 211, 41, 0.08) 35%,
      transparent 60%);
  }

  /* LISTENING – grüner Akzent, schnelle Rotation, pulsierend */
  .orb-wrap[data-state="listening"] .orb-rings {
    animation-duration: 8s;
  }
  .orb-wrap[data-state="listening"] .orb-cross {
    animation: crossPulse 1.1s ease-in-out infinite;
  }
  .orb-wrap[data-state="listening"] .ring-cyan { opacity: 0.3; }
  .orb-wrap[data-state="listening"] .ring-green { opacity: 1; }
  .orb-wrap[data-state="listening"] .orb-glow {
    background: radial-gradient(circle,
      rgba(137, 211, 41, 0.35),
      rgba(137, 211, 41, 0.1) 40%,
      transparent 65%);
    animation-duration: 1.2s;
  }

  /* THINKING – unregelmäßige Rotation, dezenterer Kontrast */
  .orb-wrap[data-state="thinking"] .orb-rings {
    animation: spinThinking 3.5s cubic-bezier(0.6, 0.05, 0.4, 0.95) infinite;
  }
  .orb-wrap[data-state="thinking"] .ring-green { opacity: 0.55; }
  .orb-wrap[data-state="thinking"] .ring-cyan  { opacity: 0.55; }
  .orb-wrap[data-state="thinking"] .orb-glow {
    background: radial-gradient(circle,
      rgba(255, 200, 80, 0.15),
      rgba(0, 188, 255, 0.1) 40%,
      transparent 65%);
    animation-duration: 3s;
  }
  .orb-wrap[data-state="thinking"] .cross-text path,
  .orb-wrap[data-state="thinking"] .cross-text polygon {
    fill: #a8bdc8;
  }

  /* SPEAKING – weich rotierend, volle Farben, audioreaktive Partikel */
  .orb-wrap[data-state="speaking"] .orb-rings {
    animation-duration: 14s;
  }
  .orb-wrap[data-state="speaking"] .ring-green,
  .orb-wrap[data-state="speaking"] .ring-cyan { opacity: 1; }
  .orb-wrap[data-state="speaking"] .orb-glow {
    background: radial-gradient(circle,
      rgba(0, 188, 255, 0.3),
      rgba(137, 211, 41, 0.18) 35%,
      transparent 60%);
    animation-duration: 2s;
  }

  @keyframes spinRings {
    to { transform: rotate(360deg); }
  }

  @keyframes spinThinking {
    0%   { transform: rotate(0deg); }
    40%  { transform: rotate(155deg); }
    55%  { transform: rotate(140deg); }
    100% { transform: rotate(360deg); }
  }

  @keyframes crossPulse {
    0%, 100% { transform: scale(1); opacity: 0.92; }
    50%      { transform: scale(1.05); opacity: 1; }
  }

  @keyframes glowBreathe {
    0%, 100% { opacity: 0.8; transform: scale(1); }
    50%      { opacity: 1;   transform: scale(1.05); }
  }

  .orb-wrap.orb-tap-hint {
    cursor: pointer;
  }
  .orb-wrap.orb-tap-hint .orb-glow {
    animation: orbTapPulse 1.4s ease-in-out infinite;
  }
  @keyframes orbTapPulse {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50%      { opacity: 1;   transform: scale(1.18); }
  }

  #tapHint {
    position: absolute;
    bottom: -28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #4db8a0;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
    white-space: nowrap;
  }
  #tapHint.visible { opacity: 1; }

  /* Chat */
  .chat {
    width: 100%;
    flex: 1;
    overflow-y: auto;
    padding: 10px 6px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    mask-image: linear-gradient(to bottom, transparent 0, black 20px, black calc(100% - 20px), transparent 100%);
  }

  .chat::-webkit-scrollbar { width: 6px; }
  .chat::-webkit-scrollbar-thumb { background: #2a3540; border-radius: 3px; }

  .msg {
    max-width: 85%;
    padding: 12px 18px;
    border-radius: 18px;
    font-size: 14.5px;
    line-height: 1.55;
    font-weight: 300;
    animation: msgFade 0.35s ease-out;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .msg.user {
    align-self: flex-end;
    background: linear-gradient(135deg, rgba(50,110,160,0.3), rgba(40,80,120,0.4));
    border: 1px solid rgba(100,160,200,0.25);
    color: #e6f2f9;
  }

  .msg.ai {
    align-self: flex-start;
    background: linear-gradient(135deg, rgba(20,40,50,0.5), rgba(15,30,40,0.6));
    border: 1px solid rgba(77,184,160,0.2);
    color: #d6e8e4;
  }

  .msg.system {
    align-self: center;
    font-size: 12px;
    color: #6a7a83;
    letter-spacing: 1px;
    background: transparent;
    border: none;
    font-style: italic;
  }

  .msg .src {
    display: block;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.08);
    font-size: 11.5px;
    color: #7fb0a0;
    word-break: break-all;
  }
  .msg .src a {
    color: #7fb0a0;
    text-decoration: none;
  }
  .msg .src a:hover { color: #a0d8c8; text-decoration: underline; }

  .typing {
    display: inline-flex;
    gap: 4px;
    align-items: center;
  }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%;
    background: #4db8a0;
    animation: typingDot 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingDot {
    0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
    30% { opacity: 1; transform: translateY(-3px); }
  }

  @keyframes msgFade {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Input bar */
  .input-bar {
    width: 100%;
    max-width: 900px;
    padding: 14px 20px 22px;
    display: flex;
    gap: 12px;
    align-items: center;
    z-index: 5;
  }

  .input-bar input {
    flex: 1;
    padding: 14px 20px;
    background: rgba(20,30,40,0.6);
    border: 1px solid rgba(100,160,180,0.2);
    border-radius: 100px;
    color: #e8e8e8;
    font-family: inherit;
    font-size: 14.5px;
    font-weight: 300;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .input-bar input:focus {
    border-color: rgba(77,184,160,0.5);
    background: rgba(25,40,50,0.8);
  }
  .input-bar input::placeholder { color: #5a6a73; }

  .btn {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 1px solid rgba(100,160,180,0.3);
    background: rgba(20,30,40,0.6);
    color: #9fb8c4;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .btn:hover {
    background: rgba(40,70,90,0.8);
    border-color: rgba(77,184,160,0.6);
    color: #b8e0d4;
  }
  .btn:active { transform: scale(0.95); }
  .btn.mic.active {
    background: rgba(60,160,100,0.3);
    border-color: rgba(120,220,160,0.8);
    color: #b8ffcc;
    animation: micPulse 1s ease-in-out infinite;
  }

  @keyframes micPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(77,220,140,0.5); }
    50% { box-shadow: 0 0 0 8px rgba(77,220,140,0); }
  }

  .btn svg { width: 20px; height: 20px; }

  /* Modal */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal.show { display: flex; }

  .modal-box {
    background: #111820;
    border: 1px solid rgba(77,184,160,0.25);
    border-radius: 16px;
    padding: 30px 32px;
    max-width: 460px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  .modal-box h2 {
    font-weight: 500;
    font-size: 18px;
    margin-bottom: 8px;
    color: #d6e8e4;
    letter-spacing: 1px;
  }
  .modal-box p {
    font-size: 13px;
    color: #8fa0a8;
    line-height: 1.6;
    margin-bottom: 18px;
    font-weight: 300;
  }
  .modal-box input {
    width: 100%;
    padding: 12px 16px;
    background: #0a1118;
    border: 1px solid rgba(100,160,180,0.25);
    border-radius: 8px;
    color: #e8e8e8;
    font-family: inherit;
    font-size: 13.5px;
    outline: none;
    margin-bottom: 14px;
  }
  .modal-box input:focus { border-color: rgba(77,184,160,0.6); }
  .modal-box button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #2a7a68, #1a5a4a);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 1px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .modal-box button:hover { opacity: 0.9; }
  .modal-hint {
    font-size: 11px;
    color: #5a6a73;
    margin-top: 12px;
    text-align: center;
  }

  @media (max-width: 600px) {
    .orb-wrap { width: 200px; height: 200px; }
    .orb-particles { width: 400px; height: 400px; }
    .msg { max-width: 92%; font-size: 14px; }
    header { padding: 14px 18px; }
    .brand { font-size: 12px; letter-spacing: 3px; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">BAYER · <span>JARVIS</span></div>
  <div class="status">
    <span class="dot"></span><span id="statusText">Bereit</span>
    <span class="voice-sep">·</span>
    <select id="voiceSelect" class="voice-select" title="Stimme auswählen"></select>
  </div>
</header>

<main>
  <div class="orb-wrap" id="orb" data-state="idle" style="position:relative">
    <canvas class="orb-particles" id="orbParticles" width="520" height="520"></canvas>
    <div class="orb-glow" id="orbGlow"></div>
    <div class="orb-rings-scale" id="orbRingsScale">
    <svg class="orb-rings" viewBox="0 0 289.1 289.1" aria-hidden="true">
      <defs>
        <filter id="ringGlow" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="1.4" result="blur"/>

            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>

      </g>
    </svg>
    </div>
    <div id="tapHint">Tippen zum Starten</div>
    <svg class="orb-cross" viewBox="0 0 289.1 289.1" aria-hidden="true">
      <g class="cross-text">
        <path d="M136.2,44.9h16.3c1.8,0,3.3-1.5,3.3-3.3c0-1.8-1.5-3.3-3.3-3.3h-16.3V44.9z M136.2,60.8H153 c2.1,0,3.7-1.7,3.7-3.7c0-2.1-1.7-3.7-3.7-3.7h-16.8V60.8z M162.4,48.8c2.2,2.2,3.6,5.2,3.6,8.5c0,6.6-5.3,11.9-11.9,11.9h-27.3 V30l26.9,0c6.3,0,11.4,5.1,11.4,11.4C165.1,44.2,164.1,46.8,162.4,48.8z"/>

        <polygon points="157.9,124.3 169.1,124.3 149.2,149.8 149.2,163.5 139.9,163.5 139.9,149.8 120,124.3 131.3,124.3 144.6,142.1"/>
        <polygon points="209.9,124.3 209.9,132.7 183.7,132.7 183.7,139.2 208.9,139.2 208.9,147.6 183.7,147.6 183.7,155.1 209.9,155.1 209.9,163.5 174.4,163.5 174.4,124.3"/>

// ---------- Claude API ----------
// ---------- Retry mit exponentiellem Backoff ----------
// Antropic-API kann 429 (Rate-Limit), 529 (Overloaded) oder 5xx werfen,
// vor allem bei längeren Konversationen mit vielen Tokens. Diese Fehler
// sind transient und lassen sich durch Wiederholung mit Backoff beheben.
const RETRY_MAX_ATTEMPTS = 4;
const RETRY_BASE_DELAY_MS = 1000;     // erste Wartezeit
const RETRY_MAX_DELAY_MS = 16000;     // Cap bei 16s
const RETRYABLE_STATUS = new Set([408, 425, 429, 500, 502, 503, 504, 529]);

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function fetchWithRetry(url, options) {
  let lastError = null;

  for (let attempt = 0; attempt < RETRY_MAX_ATTEMPTS; attempt++) {
    const isRetry = attempt > 0;
    if (isRetry) setOrbState("thinking", `Neuer Versuch ${attempt + 1}/${RETRY_MAX_ATTEMPTS}`);

    try {
      const response = await fetch(url, options);

      // Erfolg: direkt zurückgeben
      if (response.ok) return response;

      // Fehlerantwort: Body lesen (für Fehlermeldung oder Retry-Entscheidung)
      const errTxt = await response.text();

      // Harte Fehler → NICHT retryen, direkt werfen
      if (response.status === 401) {
        throw new Error("Serverfehler: API Key ungültig (401).");
      }
      if (response.status === 400 || response.status === 403 || response.status === 404) {
        throw new Error(`API Fehler (${response.status}): ${errTxt}`);
      }

      // Transiente Fehler → retry mit Backoff
      if (RETRYABLE_STATUS.has(response.status) && attempt < RETRY_MAX_ATTEMPTS - 1) {
        // Retry-After Header honorieren falls vorhanden (Anthropic setzt den bei 429)
        const retryAfterHeader = response.headers.get("retry-after");
        let delayMs;
        if (retryAfterHeader) {
          const secs = parseFloat(retryAfterHeader);
          delayMs = isNaN(secs) ? computeBackoff(attempt) : Math.min(secs * 1000, RETRY_MAX_DELAY_MS);
        } else {
          delayMs = computeBackoff(attempt);
        }
        console.warn(`API ${response.status} – retry in ${Math.round(delayMs)}ms (Versuch ${attempt + 1}/${RETRY_MAX_ATTEMPTS})`);
        lastError = new Error(`API Fehler (${response.status}): ${errTxt}`);
        await sleep(delayMs);
        continue;
      }

      // Nicht retrybar oder letzter Versuch: werfen
      throw new Error(`API Fehler (${response.status}): ${errTxt}`);

    } catch (err) {
      // Netzwerk-Fehler (fetch wirft bei offline/DNS/TLS): retry
      if (err.name === "TypeError" && attempt < RETRY_MAX_ATTEMPTS - 1) {
        const delayMs = computeBackoff(attempt);
        console.warn(`Netzwerk-Fehler – retry in ${Math.round(delayMs)}ms:`, err.message);
        lastError = err;
        await sleep(delayMs);
        continue;
      }
      throw err;
    }
  }

  throw lastError || new Error("Unbekannter Fehler nach Retries");
}

function computeBackoff(attempt) {
  // Exponentiell: 1s, 2s, 4s, 8s – plus 0-30% Jitter, damit parallele Clients nicht synchron retryen
  const base = Math.min(RETRY_BASE_DELAY_MS * Math.pow(2, attempt), RETRY_MAX_DELAY_MS);
  const jitter = base * 0.3 * Math.random();
  return base + jitter;
}

    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(body)
  });

  const data = await response.json();

  // Collect assistant content (text) and sources from web_search tool results
  let textOut = "";
  const sources = new Set();

  for (const block of data.content || []) {
    if (block.type === "text") {
      textOut += block.text;
      // Extract citations if present
      if (block.citations) {
        for (const c of block.citations) {
          if (c.url) sources.add(c.url);
        }
      }
    } else if (block.type === "web_search_tool_result") {
      // Server-side tool result – extract URLs from its content
      const results = block.content;
      if (Array.isArray(results)) {
        for (const r of results) {
          if (r.url) sources.add(r.url);
        }
      }
    }
  }

  // Record assistant turn in conversation (full content for continuity)
  conversation.push({ role: "assistant", content: data.content });

  return { text: textOut.trim(), sources: Array.from(sources) };
}

// Qualitäts-Keywords (neuronale/natürliche Stimmen)
const VOICE_QUALITY_RANK = [

const FEMALE_VOICE_NAMES = [

];

function pickBestVoice() {
  const voices = window.speechSynthesis.getVoices();
  const deVoices = voices.filter(v => v.lang && v.lang.toLowerCase().startsWith("de"));
  if (deVoices.length === 0) return null;

  const scored = deVoices.map(v => {
    const name = (v.name || "").toLowerCase();
    let score = 0;
    // Qualitätsmarker
    VOICE_QUALITY_RANK.forEach((kw, i) => {
      if (name.includes(kw)) score += (VOICE_QUALITY_RANK.length - i) * 10;
    });
    // Männliche Stimmen stark bevorzugen (+ große Gewichtung, damit Qualität zweitrangig wird, wenn männlich verfügbar)
    if (MALE_VOICE_NAMES.some(n => name.includes(n))) score += 60;
    if (FEMALE_VOICE_NAMES.some(n => name.includes(n))) score -= 20;
    // de-DE bevorzugen
    if (v.lang.toLowerCase() === "de-de") score += 5;
    if (v.localService) score += 2;
    return { v, score, name };
  });
  scored.sort((a, b) => b.score - a.score);
  console.log("Verfügbare deutsche Stimmen (sortiert):",
    scored.map(s => `${s.v.name} (${s.score})`).join(", "));
  return scored[0].v;
}

// Text für natürlichere Prosodie aufbereiten
function humanizeText(text) {
  return text
    .replace(/https?:\/\/\S+/g, "")           // URLs raus
    .replace(/\*+/g, "")                      // Markdown-Sterne raus
    .replace(/#{1,6}\s/g, "")                 // Markdown-Headers raus
    .replace(/\[([^\]]+)\]\([^\)]+\)/g, "$1") // Markdown-Links zu Text
    .replace(/`([^`]+)`/g, "$1")              // Inline-Code Backticks raus
    .replace(/\s*\n\s*\n\s*/g, ". ")          // Doppelte Zeilenumbrüche als Absatzpause
    .replace(/\s*\n\s*/g, ", ")               // Einzelne Zeilenumbrüche als Komma-Pause
    .replace(/\s{2,}/g, " ")
    .replace(/\.\s*\./g, ".")
    .replace(/([a-zäöüß])-\s/gi, "$1 ")       // Bindestrich-Umbrüche
    .trim();
}

// Text in natürliche Satz-Chunks teilen für flüssigere Sprachausgabe
function chunkSentences(text) {
  // An Satzzeichen splitten, aber Satzzeichen behalten
  const raw = text.match(/[^.!?]+[.!?]+|\S+[^.!?]*$/g) || [text];
  const chunks = [];
  let buf = "";
  for (const s of raw) {
    if ((buf + s).length < 180) buf += s;
    else { if (buf) chunks.push(buf.trim()); buf = s; }
  }
  if (buf) chunks.push(buf.trim());
  return chunks;
}

    updateVoiceIndicator("eleven");
    // Kurze Sprach-Vorschau, damit der User die neue Stimme hört
    const voice = [...ELEVEN_VOICES.male, ...ELEVEN_VOICES.female].find(v => v.id === val);
    if (voice) {
      speak(`Hallo, ich bin ${voice.name}. So klinge ich.`);
    }
  }
}

function initVoiceIndicator() {
  const render = () => buildVoiceDropdown();
  if (window.speechSynthesis && window.speechSynthesis.getVoices().length > 0) render();
  else if (window.speechSynthesis) {
    window.speechSynthesis.addEventListener("voiceschanged", render, { once: true });
    render(); // initial trotzdem rendern
  } else render();

  const sel = document.getElementById("voiceSelect");
  if (sel) sel.addEventListener("change", handleVoiceChange);
}

function speakBrowser(text) {
  if (!("speechSynthesis" in window)) { setOrbState("idle"); return; }

  const voice = pickBestVoice();
  if (voice) updateVoiceIndicator("browser", "Browser: " + voice.name);
  else updateVoiceIndicator("browser", "Keine deutsche Stimme gefunden");

  const chunks = chunkSentences(text);
  let idx = 0;

  function playNext() {
    if (idx >= chunks.length) { setOrbState("idle"); return; }
    const utter = new SpeechSynthesisUtterance(chunks[idx++]);
    utter.lang = "de-DE";
    utter.rate = 0.95;    // etwas langsamer = natürlicher
    utter.pitch = 1.0;
    utter.volume = 1.0;
    if (voice) utter.voice = voice;
    utter.onend = playNext;
    utter.onerror = () => setOrbState("idle");
    utter.onboundary = (ev) => {
      if (ev.name === "word") {
        pulseVirtualIntensity();   // triggert Ring-Pumpen + Partikel-Burst
        emitParticles(3, 0.6);
      }
    };
    window.speechSynthesis.speak(utter);
  }
  playNext();
}

async function speakElevenLabs(text) {
  const res = await fetch("/api/tts", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      voiceId: ELEVEN_VOICE_ID,
      text,
      model_id: ELEVEN_MODEL,
      voice_settings: {
        stability: 0.50,
        similarity_boost: 0.80,
        style: 0.30,
        use_speaker_boost: true,
        speed: ELEVEN_SPEED
      }
    })
  });
  if (!res.ok) {
    const errTxt = await res.text();
    throw new Error("ElevenLabs " + res.status + ": " + errTxt);
  }
  const blob = await res.blob();
  const audioUrl = URL.createObjectURL(blob);
  return new Promise((resolve, reject) => {
    const audio = new Audio(audioUrl);
    audio.crossOrigin = "anonymous";
    currentAudio = audio;
    audio.onended = () => { URL.revokeObjectURL(audioUrl); stopAudioAnalyser(); resolve(); };
    audio.onerror = (e) => { URL.revokeObjectURL(audioUrl); stopAudioAnalyser(); reject(new Error("Audio playback error")); };
    // Audio an den Analyser hängen, damit Partikel reagieren
    attachAudioAnalyser(audio);
    audio.play().catch(reject);
  });
}

// ---------- Audio-Analyse für Partikel-Reaktivität ----------
let audioCtx = null;
let analyser = null;
let analyserData = null;
let connectedSources = new WeakSet();

function attachAudioAnalyser(audioEl) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume();

    // Jedes Audio-Element darf nur einmal verbunden werden
    if (!connectedSources.has(audioEl)) {
      const source = audioCtx.createMediaElementSource(audioEl);
      if (!analyser) {
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        analyser.smoothingTimeConstant = 0.7;
        analyserData = new Uint8Array(analyser.frequencyBinCount);
      }
      source.connect(analyser);
      source.connect(audioCtx.destination);
      connectedSources.add(audioEl);
    }
  } catch (e) {
    console.warn("Audio analyser setup failed:", e);
  }
}

function stopAudioAnalyser() { /* Analyser läuft passiv weiter, nur Audio endet */ }

function getAudioIntensity() {
  if (!analyser || !analyserData) return 0;
  analyser.getByteFrequencyData(analyserData);
  // Fokus auf Sprachfrequenzen (bins 2-40 von 128 = ~80Hz-2.5kHz)
  let sum = 0;
  for (let i = 2; i < 40; i++) sum += analyserData[i];
  return Math.min(1, sum / (38 * 180));
}

// ---------- Partikel-System ----------
const particles = [];
let orbCanvas = null;
let orbCtx = null;
let lastEmit = 0;
let smoothedIntensity = 0;
let virtualIntensity = 0;   // Fallback für Browser-TTS (kein Audio-Analyser)
let ringsScaleEl = null;
let orbGlowEl = null;

function initParticles() {
  orbCanvas = document.getElementById("orbParticles");
  ringsScaleEl = document.getElementById("orbRingsScale");
  orbGlowEl = document.getElementById("orbGlow");
  if (!orbCanvas) return;
  // High-DPI Support
  const dpr = window.devicePixelRatio || 1;
  const cssW = orbCanvas.offsetWidth || 520;
  const cssH = orbCanvas.offsetHeight || 520;
  orbCanvas.width = cssW * dpr;
  orbCanvas.height = cssH * dpr;
  orbCtx = orbCanvas.getContext("2d");
  orbCtx.scale(dpr, dpr);
  requestAnimationFrame(renderParticles);
}

// Fallback-Intensität bei Browser-TTS per Wort-Boundary triggern
function pulseVirtualIntensity() {
  virtualIntensity = Math.min(1, virtualIntensity + 0.55);
}

function emitParticles(count, intensity) {
  if (!orbCanvas) return;
  const cx = (orbCanvas.offsetWidth || 520) / 2;
  const cy = (orbCanvas.offsetHeight || 520) / 2;
  // Emissions-Radius = Orb-Radius (130px der sichtbaren Orb)
  const orbRadius = 128;
  const colors = ["#89D329", "#00BCFF", "#e8f4fb", "#7fb8d8"];

  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const startR = orbRadius + (Math.random() - 0.5) * 6;
    const x = cx + Math.cos(angle) * startR;
    const y = cy + Math.sin(angle) * startR;
    const speed = 0.4 + Math.random() * 1.2 * (0.5 + intensity);
    const vx = Math.cos(angle) * speed;
    const vy = Math.sin(angle) * speed;
    particles.push({
      x, y, vx, vy,
      life: 0,
      maxLife: 60 + Math.random() * 80,
      size: 0.7 + Math.random() * 1.3 * (0.7 + intensity * 0.6),
      color: colors[Math.floor(Math.random() * colors.length)],
      swirl: (Math.random() - 0.5) * 0.02
    });
  }
}

function renderParticles() {
  if (!orbCtx) return;
  const w = orbCanvas.offsetWidth;
  const h = orbCanvas.offsetHeight;
  orbCtx.clearRect(0, 0, w, h);

  const state = orb.getAttribute("data-state");
  const now = performance.now();

  // --- Intensität bestimmen (Audio-Analyser oder Fallback) ---
  let rawIntensity = 0;
  if (state === "speaking") {
    const audioI = getAudioIntensity();
    // Virtuelle Intensität zerfällt über Zeit
    virtualIntensity = Math.max(0, virtualIntensity - 0.025);
    rawIntensity = Math.max(audioI, virtualIntensity);
  } else {
    virtualIntensity = Math.max(0, virtualIntensity - 0.05);
  }
  // Low-pass-Filter für sanftes Pumpen statt Zittern
  smoothedIntensity = smoothedIntensity * 0.72 + rawIntensity * 0.28;

  // --- Ring-Skalierung live setzen (nur im Speaking-State) ---
  if (ringsScaleEl) {
    if (state === "speaking") {
      const scale = 1 + smoothedIntensity * 0.14;   // bis ~14% größer bei lauter Silbe
      ringsScaleEl.style.transform = `scale(${scale.toFixed(3)})`;
    } else {
      ringsScaleEl.style.transform = "scale(1)";
    }
  }
  // Glow folgt der Intensität für organischere Wirkung
  if (orbGlowEl && state === "speaking") {
    const glowScale = 1 + smoothedIntensity * 0.25;
    const glowOpacity = 0.8 + smoothedIntensity * 0.4;
    orbGlowEl.style.transform = `scale(${glowScale.toFixed(3)})`;
    orbGlowEl.style.opacity = Math.min(1.2, glowOpacity).toFixed(2);
  } else if (orbGlowEl) {
    orbGlowEl.style.transform = "";
    orbGlowEl.style.opacity = "";
  }

  // --- Partikel-Emission ---
  if (state === "speaking") {
    if (smoothedIntensity > 0.03) {
      const count = Math.round(1 + smoothedIntensity * 8);
      emitParticles(count, smoothedIntensity);
    }
  } else if (state === "thinking" && now - lastEmit > 180) {
    emitParticles(1, 0.3);
    lastEmit = now;
  } else if (state === "listening" && now - lastEmit > 220) {
    emitParticles(1, 0.2);
    lastEmit = now;
  }

  // Partikel aktualisieren & zeichnen
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life++;
    // Leichte Strömungsdrehung für organischen Flow
    const swirlAngle = p.swirl;
    const cos = Math.cos(swirlAngle), sin = Math.sin(swirlAngle);
    const nvx = p.vx * cos - p.vy * sin;
    const nvy = p.vx * sin + p.vy * cos;
    p.vx = nvx * 0.995;
    p.vy = nvy * 0.995;
    p.x += p.vx;
    p.y += p.vy;

    const t = p.life / p.maxLife;
    const alpha = t < 0.2 ? t * 5 : (1 - t) * 0.9;

    orbCtx.beginPath();
    orbCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    orbCtx.fillStyle = p.color;
    orbCtx.globalAlpha = Math.max(0, alpha);
    orbCtx.shadowBlur = 6;
    orbCtx.shadowColor = p.color;
    orbCtx.fill();

    if (p.life >= p.maxLife) particles.splice(i, 1);
  }
  orbCtx.globalAlpha = 1;
  orbCtx.shadowBlur = 0;

  requestAnimationFrame(renderParticles);
}

// ---------- Send flow ----------
async function send(text) {
  text = (text || "").trim();
  if (!text) return;

  addMessage("user", text);
  textInput.value = "";

  setOrbState("thinking");
  const typing = addTyping();

  try {
    const { text: reply, sources } = await callClaude(text);
    typing.remove();
    if (reply) {
      addMessage("ai", reply, sources);
      speak(reply);
    } else {
      addMessage("ai", "Entschuldigung, ich konnte keine Antwort generieren.", sources);
      setOrbState("idle");
    }
  } catch (err) {
    typing.remove();
    addMessage("ai", "Fehler: " + err.message);
    setOrbState("idle");
    console.error(err);
  }
}

// ---------- Speech recognition ----------
function initRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { micBtn.style.display = "none"; return; }

  recognition = new SR();
  recognition.lang = "de-DE";
  recognition.continuous = false;
  recognition.interimResults = true;

  let finalText = "";

  recognition.onstart = () => {
    isRecording = true;
    finalText = "";
    micBtn.classList.add("active");
    setOrbState("listening");
  };

  recognition.onresult = (ev) => {
    let interim = "";
    for (let i = ev.resultIndex; i < ev.results.length; i++) {
      const r = ev.results[i];
      if (r.isFinal) finalText += r[0].transcript;
      else interim += r[0].transcript;
    }
    textInput.value = finalText + interim;
  };

  recognition.onerror = () => {
    isRecording = false;
    micBtn.classList.remove("active");
    setOrbState("idle");
  };

  recognition.onend = () => {
    isRecording = false;
    micBtn.classList.remove("active");
    const text = textInput.value.trim();
    if (text) send(text);
    else setOrbState("idle");
  };
}

micBtn.addEventListener("click", () => {
  if (!recognition) { alert("Spracherkennung wird von diesem Browser nicht unterstützt. Nutze bitte Chrome oder Edge."); return; }
  if (isRecording) recognition.stop();
  else { try { recognition.start(); } catch(e) {} }
});

sendBtn.addEventListener("click", () => send(textInput.value));
textInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") { e.preventDefault(); send(textInput.value); }
});

// ---------- Greeting ----------
function greet() {
  const greetText =
    "Servus. Schön dass du da bist. Womit kann ich dir heute weiterhelfen?";
  addMessage("ai", greetText);
  speak(greetText);
}

// ---------- Boot ----------
initRecognition();
// Warm up voices
if ("speechSynthesis" in window) {
  window.speechSynthesis.getVoices();
}
initVoiceIndicator();
initParticles();

setTimeout(greet, 400);

// Orb-Klick: gepufferte Begrüßung abspielen
document.getElementById("orb").addEventListener("click", () => {
  if (pendingSpeech) {
    const t = pendingSpeech;
    pendingSpeech = null;
    setOrbTapHint(false);
    speak(t);
  }
});
